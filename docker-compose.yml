version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: itsm-postgres
    environment:
      POSTGRES_USER: itsm
      POSTGRES_PASSWORD: itsm
      POSTGRES_DB: itsm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itsm"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - itsm-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: itsm-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://itsm:itsm@postgres:5432/itsm?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-12345}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-in-production-12345}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-change-me-webhook-in-production-12345}
      PORT: "8080"
      MIGRATION_PATH: file://migrations
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      APP_EMAIL_SMTP_HOST: ${APP_EMAIL_SMTP_HOST:-mail.privateemail.com}
      APP_EMAIL_SMTP_PORT: ${APP_EMAIL_SMTP_PORT:-587}
      APP_EMAIL_SMTP_USER: ${APP_EMAIL_SMTP_USER:-noreply@pcsindonesia.com}
      APP_EMAIL_SMTP_PASS: ${APP_EMAIL_SMTP_PASS:-}
      APP_EMAIL_SENDER_EMAIL: ${APP_EMAIL_SENDER_EMAIL:-noreply@pcsindonesia.com}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-https://jupyter.pcsindonesia.com}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-sso-internal}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-itsm-app}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - itsm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: itsm-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - itsm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  itsm-network:
    driver: bridge
