version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: itsm-postgres-prod
    environment:
      POSTGRES_USER: ${DB_USER:-itsm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${DB_NAME:-itsm}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-itsm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - itsm-network-prod
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: itsm-backend-prod
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${DB_USER:-itsm}:${DB_PASSWORD:-change-me-in-production}@postgres:5432/${DB_NAME:-itsm}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-12345}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-in-production-12345}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-change-me-webhook-in-production-12345}
      PORT: "8080"
      MIGRATION_PATH: file://migrations
      BASE_URL: ${BASE_URL:-https://itsm.pcsindonesia.com}
      APP_EMAIL_SMTP_HOST: ${APP_EMAIL_SMTP_HOST:-mail.privateemail.com}
      APP_EMAIL_SMTP_PORT: ${APP_EMAIL_SMTP_PORT:-587}
      APP_EMAIL_SMTP_USER: ${APP_EMAIL_SMTP_USER:-noreply@pcsindonesia.com}
      APP_EMAIL_SMTP_PASS: ${APP_EMAIL_SMTP_PASS:-}
      APP_EMAIL_SENDER_EMAIL: ${APP_EMAIL_SENDER_EMAIL:-noreply@pcsindonesia.com}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-https://jupyter.pcsindonesia.com}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-sso-internal}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-itsm-app}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - itsm-network-prod
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: itsm-frontend-prod
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - itsm-network-prod
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data_prod:
    driver: local

networks:
  itsm-network-prod:
    driver: bridge
