<VirtualHost *:80>
    ServerName itsm.pcsindonesia.com

    # Redirect HTTP to HTTPS (uncomment if using SSL)
    # RewriteEngine On
    # RewriteCond %{HTTPS} off
    # RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]

    # Frontend (React SPA)
    ProxyPreserveHost On

    # API requests → backend container
    ProxyPass /api/ http://127.0.0.1:8080/api/
    ProxyPassReverse /api/ http://127.0.0.1:8080/api/

    # Health check → backend
    ProxyPass /health http://127.0.0.1:8080/health
    ProxyPassReverse /health http://127.0.0.1:8080/health

    # Everything else → frontend container
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/itsm-error.log
    CustomLog ${APACHE_LOG_DIR}/itsm-access.log combined
</VirtualHost>

# HTTPS (uncomment and configure with your SSL cert)
