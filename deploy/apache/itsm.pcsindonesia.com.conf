<VirtualHost *:443>
    ServerName itsm.pcsindonesia.com

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/pcsindonesia.pem
    SSLCertificateKeyFile /etc/ssl/private/pcsindonesia.key

    ProxyPreserveHost On
    ProxyRequests Off

    # Increase timeout for file uploads
    ProxyTimeout 300
    
    # Allow large file uploads (attachments)
    LimitRequestBody 10485760

    # Backend API → Docker container port 8080
    ProxyPass /api/ http://127.0.0.1:8080/api/
    ProxyPassReverse /api/ http://127.0.0.1:8080/api/

    # Health check → Docker backend
    ProxyPass /health http://127.0.0.1:8080/health
    ProxyPassReverse /health http://127.0.0.1:8080/health

    # Frontend → Docker container port 3000
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/itsm-error.log
    CustomLog ${APACHE_LOG_DIR}/itsm-access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName itsm.pcsindonesia.com
    RewriteEngine On
    RewriteRule ^(.*)$ https://itsm.pcsindonesia.com$1 [R=301,L]
</VirtualHost>
